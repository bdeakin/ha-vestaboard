message:
  name: Send message
  description: Send a message to a Vestaboard.
  fields:
    device_id:
      name: Device
      description: Vestaboard to send the message to.
      required: true
      selector:
        device:
          integration: vestaboard
          multiple: true
      example: device_id
    message:
      name: Message
      description: Simple plain-text message. Ignored when components or vbml are set.
      selector:
        text:
          multiline: true
      example: This is a message
    justify:
      name: Justify
      description: Horizontal alignment for a simple message. Optional, default=center.
      selector:
        select:
          translation_key: "justify"
          options:
            - "left"
            - "right"
            - "center"
            - "justified"
      example: left
    align:
      name: Align
      description: Vertical alignment for a simple message. Optional, default=center.
      selector:
        select:
          translation_key: "align"
          options:
            - "top"
            - "bottom"
            - "center"
            - "justified"
      example: top
    props:
      name: Props
      description: >-
        Dynamic values from Home Assistant entities or templates. Reference them
        in component templates as {{prop_name}}. Home Assistant Jinja belongs
        here (not in component templates) to avoid colliding with VBML syntax.
      selector:
        object:
          label_field: name
          multiple: true
          fields:
            name:
              label: Prop name
              required: true
              selector:
                text:
            entity_id:
              label: Entity
              selector:
                entity:
            attribute:
              label: Attribute
              selector:
                text:
            template:
              label: Template
              selector:
                template:
      example:
        - name: temp
          entity_id: sensor.outdoor_temperature
          template: "{{ states('sensor.outdoor_temperature') | round(0) }}"
    components:
      name: Components
      description: >-
        Structured VBML layout regions. Each component can set its own template,
        horizontal/vertical alignment, and optional size or absolute position.
        Use {{prop_name}} placeholders that match props above.
      selector:
        object:
          label_field: template
          multiple: true
          fields:
            template:
              label: Template
              required: true
              selector:
                text:
                  multiline: true
            justify:
              label: Justify
              selector:
                select:
                  translation_key: "justify"
                  options:
                    - "left"
                    - "right"
                    - "center"
                    - "justified"
            align:
              label: Align
              selector:
                select:
                  translation_key: "align"
                  options:
                    - "top"
                    - "bottom"
                    - "center"
                    - "justified"
            height:
              label: Height (rows)
              selector:
                number:
                  min: 1
                  max: 6
                  mode: box
            width:
              label: Width (columns)
              selector:
                number:
                  min: 1
                  max: 22
                  mode: box
            x:
              label: Absolute X
              selector:
                number:
                  min: 0
                  max: 21
                  mode: box
            y:
              label: Absolute Y
              selector:
                number:
                  min: 0
                  max: 5
                  mode: box
      example:
        - template: "{{temp}} F"
          justify: center
          align: top
          height: 1
          width: 22
        - template: "{{player}}"
          justify: center
          align: bottom
          height: 2
          width: 22
    vbml:
      name: Vestaboard markup language (advanced)
      description: >-
        Raw VBML object for power users. Overrides message and components when
        provided. See https://docs.vestaboard.com/docs/vbml for more information.
      selector:
        object:
      example:
        props:
          hours: "07"
          minutes: "35"
        components:
          - style:
              justify: center
              align: center
            template: "{{hours}}:{{minutes}}"
    strategy:
      name: Transition strategy
      description: Animation style when a new message is sent.
      selector:
        select:
          translation_key: strategy
          options:
            - classic
            - column
            - reverse-column
            - edges-to-center
            - row
            - diagonal
            - random
      example: column
    step_size:
      name: Step size
      description: Number of columns/rows/bits to animate at the same time. Leave blank to animate one at a time.
      selector:
        number:
          min: 1
          max: 132
          unit_of_measurement: columns/rows/bits
      example: 2
    step_interval_ms:
      name: Step interval
      description: Delay between starting each animation step. Leave blank for immediate sequential activation.
      selector:
        number:
          min: 1
          max: 3000
          unit_of_measurement: milliseconds
      example: 500
    duration:
      name: Duration
      description: Display the message temporarily. The board will revert to its previous persistent message after the duration expires.
      selector:
        number:
          min: 10
          max: 43200
          unit_of_measurement: seconds
    bypass_quiet_hours:
      name: Bypass quiet hours
      description: Ignore quiet hours setting and send the message to the Vestaboard.
      selector:
        boolean:
